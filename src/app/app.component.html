<h1>Employees</h1>
<ul *ngFor="let e of employees">
  <li *ngIf="e.age === 5" [ngStyle]="{'color':'green'}">{{e.name}}</li>
  <li *ngIf="e.age === 20" [ngStyle]="{'color':'blue'}">{{e.name}}</li>
  <li *ngIf="e.age === 35" [ngStyle]="{'color':'red'}">{{e.name}}</li>
  <li *ngIf="e.age !== 5 && e.age !== 20 && e.age !== 35" [ngStyle]="{'color':'HotPink'}">{{e.name}}</li>
</ul>

<div class="form-group">
  <label>Name</label>
  <input class="form-control" name="name" [(ngModel)]="employeeName" />
</div>
<div class="form-group">
  <label>Age</label>
  <input class="form-control" type="number" name="age" [(ngModel)]="employeeAge" />
</div>
<div class="form-group">
  <button class="btn btn-default" (click)="addEmployee()">Отправить</button>
</div>
